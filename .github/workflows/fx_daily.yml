name: Daily FX to Notion (23:59 KST)

on:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 23:59 KST = 14:59 UTC
    - cron: "59 14 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Node 20 -> 24 전환 경고 대응 (미리 Node 24로 실행)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests
        
      - name: Run
        env:
          NOTION_TOKEN: $ secrets.NOTION_TOKEN 
          NOTION_DATABASE_ID: $ secrets.NOTION_DATABASE_ID 
        run: python fx_to_notion.py
